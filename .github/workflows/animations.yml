name: Generate Animations

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: diana180102
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=green
            dist/snake.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
